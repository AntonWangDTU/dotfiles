
# --- Basics ---
set -g mouse on                        # Enable mouse support
set -g history-limit 10000            # Scrollback buffer size
set -g base-index 1                   # Start window numbering at 1
setw -g pane-base-index 1             # Start pane numbering at 1
set -sg escape-time 0                 # Faster response for escape sequences


set-option -g default-shell /usr/bin/zsh
set-option -g default-command "exec zsh -l"

# --- Appearance ---
set -g status on
set -g status-interval 5
set -g status-justify centre
set -g status-left-length 40
set -g status-right-length 100
set -g status-left '#[fg=green]#S '
set -g status-right '#[fg=yellow]%Y-%m-%d #[fg=cyan]%H:%M #[default]'

# --- Keybindings ---
unbind C-b                        # Unbind the default prefix
set -g prefix M-a                 # Set prefix to Alt+a (M = Meta = Alt)
bind M-a send-prefix              # Allow sending the prefix itself

# --- Split shortcuts ---
bind | split-window -h -c "#{pane_current_path}"  # Split pane horizontally
bind - split-window -v -c "#{pane_current_path}"  # Split pane vertically
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
#bind c new-window -c "#{pane_current_path}"
#
# vi in scroll mode
# https://stackoverflow.com/questions/51639540/tmux-scroll-mode-vim-keybindings
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel 'xclip -in -selection clipboard'
bind-key -T copy-mode-vi Escape send -X cancel

# --- Resize panes with Alt + arrows ---
bind -n M-Left  resize-pane -L 5
bind -n M-Right resize-pane -R 5
bind -n M-Up    resize-pane -U 5
bind -n M-Down  resize-pane -D 5

# --- Reload config with prefix + r ---
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# --- Clipboard (requires xclip or pbcopy) ---
bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"

# --- Vi mode for copy/paste ---
setw -g mode-keys vi

# --- Terminal Colors ---
set -g default-terminal "screen-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"


# Enable RGB colour if running in xterm(1)
set-option -sa terminal-overrides ",xterm*:Tc"

#plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'dracula/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# -- For having correct colors in terminal
# See here:
# https://gist.github.com/andersevenrud/015e61af2fd264371032763d4ed965b6
set -g default-terminal "tmux-256color"
set -sg terminal-overrides ",*:RGB"
set -g @plugin "janoamaral/tokyo-night-tmux"

set -g @tokyo-night-tmux_show_battery_widget 1
set -g @tokyo-night-tmux_battery_name "BAT0"  # some linux distro have 'BAT0'
set -g @tokyo-night-tmux_battery_low_threshold 21 # default

#config dracula 
#set -g status-position top
#set -g @dracula-show-flags true
#set -g @dracula-border-contrast true
#set -g @dracula-show-fahrenheit false




#initalise tmux plugin manager
run '~/.tmux/plugins/tpm/tpm'

#config dracula 
set -g status-position top
set -g @dracula-show-flags true
set -g @dracula-border-contrast true



